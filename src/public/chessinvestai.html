<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♔ CHESS INVEST AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--accent:#00d4ff;--green:#00e676;--red:#ff4444;--amber:#ffb300;--text:#e8f4f8;--muted:#7a9bb5;--border:rgba(0,212,255,0.15)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Space Mono',monospace;font-size:15px;color:var(--accent);letter-spacing:2px;display:flex;align-items:center;gap:8px}
.logo span{font-size:20px}
.back-btn{color:var(--muted);text-decoration:none;font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:8px;transition:all 0.2s}
.back-btn:hover{color:var(--accent);border-color:var(--accent)}
.chat-container{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:20px}
.messages{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:16px}
.welcome{text-align:center;padding:60px 20px;color:var(--muted)}
.welcome .icon{font-size:64px;margin-bottom:16px;opacity:0.6}
.welcome h1{font-size:22px;color:var(--text);margin-bottom:8px;font-family:'Space Mono',monospace}
.welcome p{font-size:14px;line-height:1.6}
.msg{display:flex;gap:12px;max-width:85%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.ai .msg-avatar{background:rgba(0,212,255,0.15)}
.msg.user .msg-avatar{background:rgba(0,230,118,0.15)}
.msg-bubble{padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7}
.msg.ai .msg-bubble{background:var(--bg3);border:1px solid var(--border)}
.msg.user .msg-bubble{background:var(--accent);color:#000}
.msg-bubble h3{color:var(--accent);font-size:13px;margin:12px 0 6px;font-family:'Space Mono',monospace}
.msg-bubble strong{color:var(--text)}
.msg-bubble em{color:var(--muted);font-size:12px}
.msg-bubble a{color:var(--accent)}
.input-area{padding:16px 0;border-top:1px solid var(--border);display:flex;gap:10px;align-items:end}
.input-area textarea{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:none;outline:none;max-height:120px;min-height:48px}
.input-area textarea:focus{border-color:var(--accent)}
.input-area button{background:var(--accent);color:#000;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.input-area button:hover{background:#00b8d9}
.input-area button:disabled{opacity:0.4;cursor:not-allowed}
.wisdom-bar{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.1);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:12px;color:var(--muted);font-style:italic;display:none}
.typing{color:var(--muted);font-size:13px;font-style:italic}
@media(max-width:600px){.chat-container{padding:10px}.msg{max-width:95%}.welcome{padding:30px 10px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><span>♔</span> CHESS INVEST AI</div>
  <a href="/" class="back-btn">← Volver al Dashboard</a>
</div>
<div class="chat-container">
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">♔</div>
      <h1>Tu Amigo Inversor</h1>
      <p>Pregúntame sobre estrategias, análisis de acciones, mentalidad inversora o cualquier duda sobre los mercados.<br>Estoy aquí para ayudarte a invertir mejor.</p>
    </div>
  </div>
  <div class="input-area">
    <textarea id="chat-input" placeholder="Escribe tu pregunta..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button id="send-btn" onclick="sendMsg()">Enviar</button>
  </div>
  <div class="wisdom-bar" id="wisdom-bar"></div>
</div>
<script>
const input=document.getElementById('chat-input');
const messages=document.getElementById('messages');
const sendBtn=document.getElementById('send-btn');
const wisdomBar=document.getElementById('wisdom-bar');
let loading=false;

input.addEventListener('input',()=>{
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,120)+'px';
});

function formatMsg(text){
  return text
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/\[Leer más\]\(([^)]+)\)/g,'<a href="$1" target="_blank">Leer más</a>')
    .replace(/<em>(.+?)<\/em>/g,'<em>$1</em>');
}

function addMsg(role,text){
  const welcome=document.querySelector('.welcome');
  if(welcome)welcome.remove();
  const div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML=`<div class="msg-avatar">${role==='ai'?'':'👤'}</div><div class="msg-bubble">${role==='ai'?formatMsg(text):text}</div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function addTyping(){
  const div=document.createElement('div');
  div.className='msg ai';
  div.id='typing-msg';
  div.innerHTML='<div class="msg-avatar">♔</div><div class="msg-bubble"><span class="typing">Pensando...</span></div>';
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing-msg');
  if(t)t.remove();
}

async function sendMsg(){
  const text=input.value.trim();
  if(!text||loading)return;
  loading=true;
  sendBtn.disabled=true;
  addMsg('user',text);
  input.value='';
  input.style.height='auto';
  addTyping();
  wisdomBar.style.display='none';
  try{
    const res=await fetch('/api/analyzer/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text})
    });
    const data=await res.json();
    removeTyping();
    addMsg('ai',data.response||'Lo siento, no pude procesar tu pregunta.');
    if(data.wisdom){
      wisdomBar.textContent='💡 '+data.wisdom;
      wisdomBar.style.display='block';
    }
  }catch(e){
    removeTyping();
    addMsg('ai','Error de conexión. Verifica tu internet e inténtalo de nuevo.');
  }
  loading=false;
  sendBtn.disabled=false;
  input.focus();
}
</script>
</body>
</html>
