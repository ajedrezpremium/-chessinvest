<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ STOCKBROKER AI - Futuros</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--accent:#b388ff;--green:#00e676;--red:#ff4444;--amber:#ffb300;--text:#e8f4f8;--muted:#7a9bb5;--border:rgba(179,136,255,0.2)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg2);border-bottom:2px solid var(--accent);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Space Mono',monospace;font-size:15px;color:var(--accent);letter-spacing:2px;display:flex;align-items:center;gap:8px}
.logo span{font-size:20px}
.header-actions{display:flex;align-items:center;gap:10px}
.back-btn{color:var(--muted);text-decoration:none;font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:8px;transition:all 0.2s}
.back-btn:hover{color:var(--accent);border-color:var(--accent)}
.status-bar{display:flex;gap:12px;padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;font-family:'Space Mono',monospace;overflow-x:auto}
.status-item{display:flex;align-items:center;gap:4px;color:var(--muted);white-space:nowrap}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.green{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.red{background:var(--red);box-shadow:0 0 6px var(--red)}
.status-dot.yellow{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.chat-container{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:20px}
.messages{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:16px}
.welcome{text-align:center;padding:60px 20px;color:var(--muted)}
.welcome .icon{font-size:64px;margin-bottom:16px;opacity:0.6}
.welcome h1{font-size:22px;color:var(--text);margin-bottom:8px;font-family:'Space Mono',monospace}
.welcome p{font-size:14px;line-height:1.6}
.msg{display:flex;gap:12px;max-width:85%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.ai .msg-avatar{background:rgba(179,136,255,0.15)}
.msg.user .msg-avatar{background:rgba(0,230,118,0.15)}
.msg-bubble{padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;position:relative}
.msg.ai .msg-bubble{background:var(--bg3);border:1px solid var(--border)}
.msg.user .msg-bubble{background:var(--accent);color:#000}
.msg-bubble h3{color:var(--accent);font-size:13px;margin:12px 0 6px;font-family:'Space Mono',monospace}
.msg-bubble strong{color:var(--text)}
.msg-bubble em{color:var(--muted);font-size:12px}
.msg-bubble a{color:var(--accent)}
.form-container{position:relative;border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px 0;background:var(--bg2)}
.form-close{position:absolute;top:8px;right:8px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;transition:all 0.2s}
.form-close:hover{color:var(--red);border-color:var(--red)}
.form-container.hidden{display:none}
.input-area{padding:16px 0;border-top:1px solid var(--border);display:flex;gap:10px;align-items:end}
.input-area textarea{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:none;outline:none;max-height:120px;min-height:48px}
.input-area textarea:focus{border-color:var(--accent)}
.input-actions{display:flex;gap:6px}
.input-actions button{background:var(--bg2);color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:16px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;width:48px;height:48px}
.input-actions button:hover{color:var(--accent);border-color:var(--accent)}
.input-actions button.recording{background:var(--red);color:#fff;border-color:var(--red);animation:pulse-btn 1s infinite}
@keyframes pulse-btn{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#send-btn{background:var(--accent)!important;color:#000!important;font-weight:600;width:auto!important;padding:12px 20px!important;font-size:14px!important}
#send-btn:hover{background:#9c6cff!important}
#send-btn:disabled{opacity:0.4!important;cursor:not-allowed!important}
.info-bar{background:rgba(179,136,255,0.05);border:1px solid rgba(179,136,255,0.1);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:12px;color:var(--muted);display:none}
.typing{color:var(--muted);font-size:13px;font-style:italic}
@media(max-width:600px){.chat-container{padding:10px}.msg{max-width:95%}.welcome{padding:30px 10px}.header{flex-direction:column;gap:10px}.status-bar{font-size:10px;gap:8px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><span>⚡</span> STOCKBROKER AI</div>
  <div class="header-actions">
    <span style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace">FUTURES · ÍNDICES · COMMODITIES</span>
    <a href="/" class="back-btn">← Dashboard</a>
  </div>
</div>
<div class="status-bar" id="status-bar">
  <span class="status-item">Cargando datos...</span>
</div>
<div class="chat-container">
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">⚡</div>
      <h1>Stockbroker AI</h1>
      <p>Agente institucional especializado en futuros financieros, índices, materias primas, divisas y bonos.<br>Análisis cuantitativo, técnico, macro y de sentimiento en tiempo real.</p>
    </div>
  </div>
  <div class="input-area">
    <textarea id="chat-input" placeholder="Analiza ES, petróleo, oro, VIX, o pregunta sobre estrategias de futuros..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <div class="input-actions">
      <button id="mic-btn" onclick="toggleVoiceInput()" title="Input por voz">🎤</button>
      <button id="send-btn" onclick="sendMsg()">Enviar</button>
    </div>
  </div>
  <div class="info-bar" id="info-bar"></div>
</div>
<script>
const input=document.getElementById('chat-input');
const messages=document.getElementById('messages');
const sendBtn=document.getElementById('send-btn');
const infoBar=document.getElementById('info-bar');
let loading=false;

function formatMsg(text){
  let html=text
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/\[Leer más\]\(([^)]+)\)/g,'<a href="$1" target="_blank">Leer más</a>');
  if(html.includes('<form')||html.includes('<input')||html.includes('checkbox')){
    html=`<button class="form-close" onclick="this.parentElement.classList.add('hidden')">✕ Cerrar</button>`+html;
    html=`<div class="form-container">${html}</div>`;
  }
  return html;
}

function addMsg(role,text){
  const welcome=document.querySelector('.welcome');
  if(welcome)welcome.remove();
  const div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML=`<div class="msg-avatar">${role==='ai'?'⚡':'👤'}</div><div class="msg-bubble">${role==='ai'?formatMsg(text):text}</div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function addTyping(){
  const div=document.createElement('div');
  div.className='msg ai';
  div.id='typing-msg';
  div.innerHTML='<div class="msg-avatar">⚡</div><div class="msg-bubble"><span class="typing">Analizando mercados...</span></div>';
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing-msg');
  if(t)t.remove();
}

async function sendMsg(){
  const text=input.value.trim();
  if(!text||loading)return;
  loading=true;
  sendBtn.disabled=true;
  addMsg('user',text);
  input.value='';
  input.style.height='auto';
  addTyping();
  infoBar.style.display='none';
  try{
    const res=await fetch('/api/stockbroker/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text})
    });
    const data=await res.json();
    removeTyping();
    const response=data.response||'Lo siento, no pude procesar tu análisis.';
    addMsg('ai',response);
    if(data.insights){
      infoBar.textContent='💡 '+data.insights;
      infoBar.style.display='block';
    }
  }catch(e){
    removeTyping();
    addMsg('ai','Error de conexión. Verifica tu internet e inténtalo de nuevo.');
  }
  loading=false;
  sendBtn.disabled=false;
  input.focus();
}

const micBtn=document.getElementById('mic-btn');

input.addEventListener('input',()=>{
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,120)+'px';
});

let isListening=false;
let recognition=null;

function initSpeechRecognition(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition)return null;
  const rec=new SpeechRecognition();
  rec.continuous=false;
  rec.interimResults=true;
  rec.lang='es-ES';
  rec.onresult=(event)=>{
    let final='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      if(event.results[i].isFinal)final+=event.results[i][0].transcript;
    }
    if(final){input.value=final.trim();input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';}
  };
  rec.onend=()=>{isListening=false;micBtn.classList.remove('recording');};
  rec.onerror=()=>{isListening=false;micBtn.classList.remove('recording');};
  return rec;
}

function toggleVoiceInput(){
  if(isListening){
    if(recognition)recognition.stop();
    isListening=false;
    micBtn.classList.remove('recording');
    return;
  }
  if(!recognition){
    recognition=initSpeechRecognition();
    if(!recognition){alert('Tu navegador no soporta reconocimiento de voz.');return;}
  }
  recognition.start();
  isListening=true;
  micBtn.classList.add('recording');
}

async function updateStatusBar(){
  try{
    const res=await fetch('/api/stockbroker/futures');
    const data=await res.json();
    if(!data.futures?.length)return;
    const bar=document.getElementById('status-bar');
    bar.innerHTML=data.futures.filter(f=>['vix','dxy','us10y','gold','wti','btc','spx','ndx'].includes(f.id)).map(f=>{
      const dotClass=f.dir==='up'?'green':f.dir==='down'?'red':'yellow';
      return `<span class="status-item"><span class="status-dot ${dotClass}"></span> ${f.name}: ${f.val} (${f.chg})</span>`;
    }).join('');
  }catch(e){}
}

updateStatusBar();
setInterval(updateStatusBar,60000);
</script>
</body>
</html>
