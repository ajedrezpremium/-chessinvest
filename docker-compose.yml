version: '3.8'

services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openrouter/free}
      - OPENROUTER_APP_NAME=CHESSINVEST
      - OPENROUTER_REFERER=${OPENROUTER_REFERER:-https://chessinvest.com}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - chessinvest_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  chessinvest_data:
